<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="myads_title">My Ads | KalMarket</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card-content h3 {
            margin: 0 0 10px;
            font-size: 1.1rem;
        }

        .card-content p {
            margin: 5px 0;
        }

        .card-content button {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            background: #dc3545;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .card-content button:hover {
            background: #b52b3a;
        }
/* FILTER BUTTONS */
.myads-filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 15px;
    margin-bottom: 20px;
}

.filter-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #e5e5e5;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: 0.3s;
}

.filter-btn.active {
    background: #007bff;
    color: white;
}

.filter-btn:hover {
    opacity: 0.9;
}
        .loading {
            text-align: center;
            color: gray;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto;">

        <h1 data-i18n="app_name">Kal Market</h1>

        <div class="nav">
            <a href="index.html" class="btn text" data-i18n="home">Home</a>
            <a href="post.html" class="btn primary" data-i18n="postAd">Post Ad</a>
            <button id="logoutBtn" class="btn secondary" style="display:none;">Logout</button>
        </div>

    </div>
</header>

<!-- MAIN CONTENT -->
<main class="myads-container" style="max-width:1200px; margin:20px auto; padding:0 15px;">

    <div class="section-header">
<!-- FILTER BUTTONS -->

        <h2 data-i18n="your_active_listings">Your Active Listings</h2>
        <p id="userGreeting" style="color:gray; margin-top:5px;"></p>
    </div>
<div class="myads-filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="sold">Sold</button>
</div>
    <!-- ADS GRID -->
    <div id="myAdsContainer" class="ads-grid">
        <p class="loading" data-i18n="loading_ads">Loading your ads...</p>
    </div>

    <!-- FOOTER -->
    <div class="footer-actions" style="margin-top:20px;">
        <a href="index.html" class="btn text" data-i18n="back_home">← Back to Home</a>
    </div>

</main>

<!-- SCRIPTS -->
<script src="storage.js"></script>
<script src="languages.js"></script>

<!-- Main My Ads Logic -->
<script type="module" src="myads.js"></script>

<!-- USER GREETING -->
<script type="module">
import { auth } from "./firebase-config.js";
import {
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

document.addEventListener("DOMContentLoaded", () => {

    const greetingEl = document.getElementById("userGreeting");
    const logoutBtn = document.getElementById("logoutBtn");

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (greetingEl) {
                greetingEl.innerText = `Logged in as: ${user.email}`;
            }

            if (logoutBtn) {
                logoutBtn.style.display = "inline-block";

                logoutBtn.addEventListener("click", async () => {
                    await signOut(auth);
                    window.location.href = "index.html";
                });
            }

        } else {
            window.location.href = "login.html";
        }
    });

});
</script>

</body>
</html>
