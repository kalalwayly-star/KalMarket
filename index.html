<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marketplace | Find Anything</title>

<link rel="stylesheet" href="style.css">

<style>
/* ---------- BASIC UI ---------- */
.cat-card, .btn-search, .btn-link, .card { cursor: pointer; }

.category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.cat-card {
    text-align: center;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 8px;
    transition: 0.2s;
}

.cat-card:hover {
    background: #f9f9f9;
    transform: translateY(-3px);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* ---------- SLIDER (IMPORTANT) ---------- */
.slider {
    position: relative;
    width: 100%;
    height: 200px;
    overflow: hidden;
}

.slide {
    display: none;
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.slide.active {
    display: block;
}

.slider button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

.slider .prev { left: 5px; }
.slider .next { right: 5px; }

</style>

</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="container">

    <h1>My Marketplace</h1>

    <!-- NAV -->
    <div class="nav">
        <a href="index.html" class="btn">Home</a>
        <a href="messages.html" class="btn">Messages</a>
        <a href="myads.html" class="btn">My Ads</a>
        <a href="post.html" class="btn primary">Post Ad</a>

        <a id="userAuth" href="login.html" class="btn">Login</a>
        <button id="logout-btn" style="display:none;">Logout</button>
    </div>

    <!-- USER INFO -->
    <div id="user-info-header" style="display:none;">
        Logged in as: <span id="header-user-email"></span>
    </div>

</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-content">

    <h2>Find anything in your city</h2>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="What are you looking for?">
        <input type="text" id="locationInput" placeholder="City or Neighborhood">

        <button id="searchBtn" class="btn-search">Search</button>
    </div>

</div>
</section>

<!-- CATEGORIES -->
<section class="categories-section container">

<h3>Browse Categories</h3>

<div class="category-grid">

    <div class="cat-card" onclick="filterByCategory('Real Estate')">🏠 <p>Real Estate</p></div>
    <div class="cat-card" onclick="filterByCategory('Cars & Trucks')">🚗 <p>Cars</p></div>
    <div class="cat-card" onclick="filterByCategory('Furniture')">🛋️ <p>Furniture</p></div>
    <div class="cat-card" onclick="filterByCategory('Jobs')">💼 <p>Jobs</p></div>
    <div class="cat-card" onclick="filterByCategory('Fashion')">👕 <p>Fashion</p></div>
    <div class="cat-card" onclick="filterByCategory('Pets')">🐾 <p>Pets</p></div>
    <div class="cat-card" onclick="filterByCategory('Sports')">🏀 <p>Sports</p></div>
    <div class="cat-card" onclick="filterByCategory('Books')">📚 <p>Books</p></div>
    <div class="cat-card" onclick="filterByCategory('Electronics')">📱 <p>Electronics</p></div>
    <div class="cat-card" onclick="filterByCategory('Services')">🛠️ <p>Services</p></div>

</div>

</section>

<!-- LISTINGS -->
<section class="main-content container">

<div style="display:flex; justify-content:space-between; align-items:center;">
    <h3>Latest Ads</h3>
    <button id="resetBtn" class="btn-link">View All</button>
</div>

<p id="no-items-message" style="display:none; text-align:center;">No items found.</p>

<div id="listings" class="grid"></div>

</section>

<!-- FOOTER -->
<footer style="text-align:center; padding:30px; border-top:1px solid #eee;">
    <a href="terms.html">Terms</a> |
    <a href="safety.html">Safety</a> |
    <a href="privacy.html">Privacy</a>
</footer>

<!-- SCRIPTS -->
<script src="storage.js"></script>
<script src="languages.js"></script>
<script type="module" src="main.js"></script>

</body>
</html>
