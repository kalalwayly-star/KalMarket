<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Ad Details | Kal Market</title>
   <link rel="stylesheet" href="style.css">
   <style>
       /* Basic Fix for Grid Layout */
       .detail-grid { display: flex; gap: 30px; margin-top: 20px; }
       .content-main { flex: 2; }
       .content-sidebar { flex: 1; min-width: 300px; }
.main-image { width: 100%; height: auto; min-height: 300px; background: #f4f4f4; border-radius: 10px; margin-bottom: 20px; }
       .price-card { background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
       .price-tag { font-size: 2rem; color: #007bff; font-weight: bold; margin: 10px 0; }
       #adImageContainer img { max-width: 100%; border-radius: 10px; display: block; }
       
       /* Report Modal Styling */
       #reportModal { 
           display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
           background: white; border: 1px solid #ccc; padding: 30px; z-index: 1000;
           box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 8px;
       }
   </style>
</head>
<body class="auth-page-body">

<header class="header">
   <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto;">
       <h1>Kal Market</h1>
       <div class="nav">
           <a href="index.html" class="btn text" data-i18n="back_home">Back to Browse</a>
       </div>
   </div>
</header>

<main class="container detail-wrapper" style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">
   <div class="detail-grid">
       
       <!-- Left Side: Image and Description -->
       <div class="content-main">
           <!-- THE IMAGE BOX -->
           <div class="ad-gallery">
    <div class="main-image">
        <img id="mainAdImage" src="" alt="Ad Image">
    </div>

    <div id="thumbnailGallery" class="thumbnail-gallery"></div>
</div>

           <div class="description-section">
                <h2 data-i18n="label_description">Description</h2>
                <p id="adDesc" style="white-space: pre-wrap;">Loading description...</p>
           </div>
       </div>

       <!-- Right Side: Price and Contact -->
       <div class="content-sidebar">
           <div class="price-card">
               <h1 id="adTitle">Loading Title...</h1>
               <p class="ad-category" id="adCategory"></p>
               <div class="price-tag"><span id="adPrice">0</span></div>
               <p class="location-tag">📍 <span id="adLocation">Unknown</span></p>
              
               <hr>
              
               <h3 data-i18n="contact_seller">Contact Seller</h3>
               
               <!-- Messaging Section -->
               <div id="contactSection" style="margin-top: 20px;">
                   <textarea 
                        id="messageText" 
                        placeholder="Hi, is this still available?" 
                        data-i18n-placeholder="message_placeholder"
                        rows="4"
                        style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
                    
                    <button 
                        onclick="sendMessage()" 
                        class="btn-primary-large" 
                        style="margin-top: 10px; width: 100%; cursor: pointer;"
                        data-i18n="send_message">
                        Send Message
                    </button>              

                    <!-- Report System -->
                    <button id="reportBtn" onclick="showReportModal()" style="margin-top: 15px; border: none; background: none; color: #ff4444; cursor: pointer; text-decoration: underline;" data-i18n="report_ad">
                        Report this Ad
                    </button>
               </div>

           </div>
       </div>
   </div>
</main>

<!-- Report Modal Popup -->
<div id="reportModal">
    <h3 data-i18n="report_ad">Report Ad</h3>
   <select id="reportReason" required>
    <option value="" data-i18n="select_reason">Select a reason</option>
    <option value="scam" data-i18n="report_scam">Scam or Fraud</option>
    <option value="illegal" data-i18n="report_illegal">Illegal Item or Service</option>
    <option value="spam" data-i18n="report_spam">Spam or Duplicate Listing</option>
    <option value="fake" data-i18n="report_fake">Fake or Misleading Listing</option>
    <option value="inappropriate" data-i18n="report_inappropriate">Inappropriate Content</option>
    <option value="counterfeit" data-i18n="report_counterfeit">Counterfeit Product</option>
    <option value="harassment" data-i18n="report_harassment">Harassment or Abuse</option>
    <option value="other" data-i18n="report_other">Other Policy Violation</option>
</select>
    <div style="display: flex; gap: 10px;">
        <button onclick="submitReport()" class="btn" data-i18n="submit_report" style="background: #28a745; color: white; border: none; padding: 10px;">Submit</button>
        <button onclick="closeModal()" class="btn" data-i18n="cancel" style="background: #ccc; border: none; padding: 10px;">Cancel</button>
    </div>
</div>

<footer>
    <div class="container" style="text-align: center; padding: 20px 0; border-top: 1px solid #eee; margin-top: 40px;">
        <p data-i18n="footer_copy">© 2026 Classified-Site</p>
        <ul style="list-style: none; display: flex; justify-content: center; gap: 20px; padding: 0;">
            <li><a href="terms.html" data-i18n="footer_terms">Terms of Service</a></li>
            <li><a href="privacy.html" data-i18n="footer_privacy">Privacy Policy</a></li>
            <li><a href="safety.html" data-i18n="footer_safety">Safety Tips</a></li>
           
        </ul>
            <a href="login.html" data-i18n="login">Login</a>
            <a href="register.html" data-i18n="register">Register</a>    </div>
</footer>

<!-- Scripts -->
<script src="languages.js"></script>
<script src="storage.js"></script>
<script type="module" src="details.js"></script>

</body>
</html>
