<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Classified Site</title>
    <!-- FIX: Corrected Font Awesome Link -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">    <!-- FIX: Updated versioning to v=1.2 to match your latest CSS save -->
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body class="auth-page-body">

<div class="auth-wrapper">
    <div class="form-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join our marketplace today.</p>
        
        <!-- Error Message Placeholder -->
        <div id="error-message" class="error-text" style="text-align: center; margin-bottom: 15px;"></div>

        <!-- Step 1: Basic Info -->
        <!-- Password -->
<div class="input-group">
    <label>Password</label>

    <input type="password"
           id="registerPassword"
           data-i18n-placeholder="enter_password"
           placeholder="Enter your password">

    <i class="fas fa-eye" id="toggleRegPassword"></i>
</div>

<!-- Button -->
<button type="button" class="btn-primary" onclick="register()">
    Create Account
</button>
        
        <div class="divider"><span>OR</span></div>

       <div style="text-align: center;">
    <p style="font-size: 14px; color: #666;">
        <span data-i18n="already_have_account">Already have an account?</span> 
        <a href="login.html" data-i18n="login_here" style="color: #007bff; text-decoration: none; font-weight: bold;">Login here</a>
    </p>
</div>

    </div>
</div>

<!-- Scripts -->
<script type="module" src="register.js"></script>
<script>
    // Eye toggle for registration page
    const toggleBtn = document.getElementById('toggleRegPassword');
    const passInput = document.getElementById('loginPassword');

    if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        });
    }
</script>

</body>
</html>
