<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="register_page_title">Create Account - Classified Site</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css?v=1.2">
</head>

<body class="auth-page-body">

<div class="auth-wrapper">
    <div class="form-card">

        <!-- Header -->
        <h2 data-i18n="create_account_title">Create Account</h2>
        <p class="subtitle" data-i18n="register_subtitle">
            Join our marketplace today.
        </p>

        <!-- Error Message -->
        <div id="error-message" class="error-text" style="text-align:center; margin-bottom:15px;"></div>

        <!-- Registration Form -->
        <form id="registerForm" onsubmit="event.preventDefault(); register();">

            <!-- Email -->
            <div class="input-group">
                <label data-i18n="label_email">Email Address</label>
                <input
                    type="email"
                    id="registerEmail"
                    data-i18n-placeholder="enter_email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <!-- Password -->
            <div class="input-group password-group">
                <label data-i18n="label_password">Password</label>

                <input
                    type="password"
                    id="registerPassword"
                    data-i18n-placeholder="enter_password"
                    placeholder="Enter your password"
                    required
                >

                <i class="fas fa-eye toggle-password" id="toggleRegPassword"></i>
            </div>

            <!-- Register Button -->
            <button
                type="submit"
                class="btn-primary"
                data-i18n="create_account_btn"
            >
                Create Account
            </button>

        </form>

        <!-- Divider -->
        <div class="divider">
            <span data-i18n="or_divider">OR</span>
        </div>

        <!-- Login Redirect -->
        <div style="text-align:center;">
            <p style="font-size:14px; color:#666;">
                <span data-i18n="already_have_account">
                    Already have an account?
                </span>

                <a
                    href="login.html"
                    data-i18n="login_here"
                    style="color:#007bff; text-decoration:none; font-weight:bold;"
                >
                    Login here
                </a>
            </p>
        </div>

    </div>
</div>

<!-- Language Script -->
<script src="languages.js"></script>

<!-- Register Logic -->
<script type="module" src="register.js"></script>

</body>
</html>
