<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="post_page_title">Post Ad | KalMarket</title>
    <link rel="stylesheet" href="style.css">
<script src="https://www.paypal.com/sdk/js?client-id=BAALjbSyVpTywXL1shHMGKfQdSGCjgfLPchku1LlvChOCvK1gNTdU8nZrp9ApWOBqKZuIbDXVecCGOSqjE&components=buttons&currency=CAD"></script>

</head>
<body>
    <header class="header">
        <div class="container">
            <h1 data-i18n="myTitle">Kal Market</h1>
            <div class="nav">
                <a href="index.html" class="btn text" data-i18n="home">Home</a>
            </div>
        </div>
    </header>

    <div class="form-wrapper">
        <div class="form-card">
            <h2 data-i18n="post_ad_header">Post a New Listing</h2>
            <form id="postForm" enctype="multipart/form-data">

               <div class="form-section">
    <label for="postCategory" data-i18n="category_label">Category</label>
        <select id="postCategory" name="category">    
        <option value="" data-i18n="select_category">Choose Category</option>
        <option value="Real Estate" data-i18n="cat_realestate">Real Estate</option>
        <option value="Cars & Trucks" data-i18n="cat_cars_trucks">Cars and Trucks</option>
        <option value="Electronics" data-i18n="cat_electronics">Electronics</option>
        <option value="Auto Accessories" data-i18n="cat_auto_accessories">Auto Accessories</option>
        <option value="Furniture" data-i18n="cat_furniture">Furniture</option>
        <option value="Job" data-i18n="cat_job">Jobs</option>
        <option value="Fashion" data-i18n="cat_fashion">Fashion</option>
        <option value="Pets" data-i18n="cat_pets">Pets</option>
        <option value="Sports" data-i18n="cat_sports">Sports</option>
        <option value="Books" data-i18n="cat_books">Books</option>
        <option value="Appliances" data-i18n="cat_appliances">Appliances</option>
        <option value="Toys" data-i18n="cat_toys">Toys</option>
        <option value="Services" data-i18n="cat_services">Services</option>
        <option value="Garden" data-i18n="cat_garden">Garden</option>
        <option value="Health" data-i18n="cat_health">Health</option>
        <option value="Baby" data-i18n="cat_baby">Baby</option>
        <option value="Buy&Sale" data-i18n="cat_buy&sale">Buy&Sale</option>

    </select>
</div>

<div class="form-section photo-section">
    <h3 class="section-title" data-i18n="photo_header">Photos</h3>

    <div class="upload-wrapper">
        <!-- Modern Upload Box -->
        <label for="photoInput" class="upload-dropzone">
            <div class="upload-content">
                <img src="https://img.icons8.com/ios/452/camera.png" alt="Upload" class="camera-icon">
                <div class="text-group">
                    <span class="main-text" data-i18n="click_to_add">Add Photos</span>
                    <span class="sub-text">Max 10 images • JPG, PNG, WEBP</span>
                </div>
            </div>
            <input type="file" id="photoInput" accept="image/*" multiple hidden>
        </label>

        <!-- Horizontal Scroll Gallery -->
        <div id="galleryPreview" class="gallery-scroll-container">
            <!-- JavaScript will inject images here -->
        </div>

        <!-- Professional Progress Bar -->
        <div id="uploadProgress" class="progress-wrapper" style="display:none;">
            <div class="progress-info">
                <span>Uploading...</span>
                <span id="percentText">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<div id="section-Cars" class="category-details" style="display:none;">

    <h3 data-i18n="vehicle_information">Vehicle Information</h3>

    <div class="form-row">
        <div class="input-group">
            <label data-i18n="label_make">Make</label>
            <input type="text" id="carMake" data-i18n-placeholder="placeholder_make" placeholder="Toyota">
        </div>

        <div class="input-group">
            <label data-i18n="label_model">Model</label>
            <input type="text" id="carModel" data-i18n-placeholder="placeholder_model" placeholder="Camry">
        </div>
    </div>

    <div class="form-row">
        <div class="input-group">
            <label data-i18n="label_year">Year</label>
            <input type="number" id="carYear" data-i18n-placeholder="placeholder_year" placeholder="2022">
        </div>

        <div class="input-group">
            <label data-i18n="label_mileage">Mileage</label>
            <input type="number" id="carMileage" data-i18n-placeholder="placeholder_mileage" placeholder="50000">
        </div>
    </div>

    <div class="form-row">
        <div class="input-group">
            <label data-i18n="label_transmission">Transmission</label>
            <select id="carTransmission">
                <option value="" data-i18n="select_option">Select</option>
                <option data-i18n="transmission_automatic">Automatic</option>
                <option data-i18n="transmission_manual">Manual</option>
            </select>
        </div>

        <div class="input-group">
            <label data-i18n="label_fuel_type">Fuel Type</label>
            <select id="carFuel">
                <option value="" data-i18n="select_option">Select</option>
                <option data-i18n="fuel_gasoline">Gasoline</option>
                <option data-i18n="fuel_diesel">Diesel</option>
                <option data-i18n="fuel_electric">Electric</option>
                <option data-i18n="fuel_hybrid">Hybrid</option>
            </select>
        </div>
    </div>

</div>

<!-- Common Fields -->
<div id="commonFields">
    <label for="adTitle" data-i18n="label_title">Title:</label>
    <input type="text" id="adTitle" required />

    <label for="adPrice" data-i18n="label_price">Price:</label>
    <input type="number" id="adPrice" required />

    <label for="adLocation" data-i18n="label_location">Location:</label>
    <input type="text" id="adLocation" required />

    <label for="adDesc" data-i18n="label_description">Description:</label>
    <textarea id="adDesc" required></textarea>
</div>

<!-- Condition -->
<div class="form-container">
  <fieldset id="conditionFields" class="form-section">
    <legend class="condition-label" data-i18n="condition_label">Condition</legend>

    <div class="condition-group">
      <label class="condition-option">
        <input type="radio" name="condition" value="New">
        <span data-i18n="opt_new">New</span>
      </label>

      <label class="condition-option">
        <input type="radio" name="condition" value="Used">
        <span data-i18n="opt_used">Used</span>
      </label>

      <label class="condition-option">
        <input type="radio" name="condition" value="Refurbished">
        <span data-i18n="opt_refurbished">Refurbished</span>
      </label>
    </div>
  </fieldset>
</div>

<!-- Featured Section -->
<div class="feature-container">

    <!-- Free -->
    <label class="feature-card">
        <input type="radio" name="feature_selection" value="none" class="feature-input" checked>
        <div class="feature-content">
            <span class="feature-text" data-i18n="standard_listing">Standard Listing (Free)</span>
            <span class="status-badge" data-i18n="not_interested">Not interested</span>
        </div>
    </label>

    <!-- 5 Days -->
    <label class="feature-card">
        <input type="radio" name="feature_selection" value="5days" id="isFeatured5Days" class="feature-input">
        <div class="feature-content">
            <span class="feature-text" data-i18n="label_featured">✨ Feature this ad for</span>
            <span class="price-badge" id="price-5-days" data-i18n="featured_5_days">$4.99 for 5 days</span>
        </div>
    </label>

    <!-- 10 Days -->
    <label class="feature-card">
        <input type="radio" name="feature_selection" value="10days" id="isFeatured10Days" class="feature-input">
        <div class="feature-content">
            <span class="feature-text" data-i18n="label_featured">✨ Feature this ad for</span>
            <span class="price-badge" id="price-10-days" data-i18n="featured_10_days">$8.99 for 10 days</span>
        </div>
    </label>

</div>
<div id="paypal-button-container" style="display:none; margin-top:20px;"></div>
<!-- SINGLE PAYPAL BUTTON CONTAINER -->
<div id="paypal-button-container" style="display:none; margin-top:20px;"></div>


<!-- =========================
POST BUTTON
========================= -->
<button type="submit" id="postBtn" class="btn primary" data-i18n="post_btn">
    Post Ad Now
</button>

 <div class="card" onclick="goToDetails('ad-id-123')">


    <!-- CORE SCRIPTS -->
    <script src="languages.js"></script>

    <script type="module" src="post.js"></script>
</body>
</html>
